providers = ["node"]

[variables]
NPM_CONFIG_PRODUCTION = "false"
NPM_CONFIG_CACHE = "/tmp/npm-cache"
NIXPACKS_NODE_VERSION = "22"

[phases.setup]
nixPkgs = ["nodejs_22"]

[phases.install]
cmds = ["npm ci --include=dev"]

[phases.build]
# Only build — never npm ci here (conflicts with Nixpacks node_modules/.cache mount).
cmds = ["npm run build"]

[start]
cmd = "npm run start"
